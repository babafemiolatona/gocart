version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gocart-app
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8080:8080"

    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
  postgres:
    image: postgres:17-alpine
    container_name: gocart-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gocart"]
      interval: 10s
      timeout: 5s
      retries: 5

  # redis:
  #   image: redis:8-alpine
  #   container_name: gocart-redis
  #   restart: unless-stopped

  #   ports:
  #     - "6379:6379"

  #   volumes:
  #     - redis_data:/data

  minio:
    image: quay.io/minio/minio:latest
    container_name: gocart-minio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  # redis_data:
  minio_data: